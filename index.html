  <!-- Web Audio click sound helper -->
  <script>
    let soundEnabled = true;
    const playClickSound = () => {
      if (!soundEnabled) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } catch(e) {}
    };

    document.getElementById('sound-btn').addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('sound-btn');
      btn.innerHTML = soundEnabled ? '<i data-lucide="volume-2" class="h-4 w-4"></i>' : '<i data-lucide="volume-x" class="h-4 w-4"></i>';
      lucide.createIcons();
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('a') || e.target.closest('button')) {
        playClickSound();
      }
    });
  </script>

  <!-- Canvas Particles Background Script -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 35;

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.size = Math.random() * 2 + 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) particles.push(new Particle());

    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(0, 242, 254, 0.04)';
      ctx.lineWidth = 0.8;
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    };
    animate();
  </script>

    const toggleExploredDetail = (id) => {

    const escapeHtml = (unsafe) => {

    // Render unique schematic or static image

        'command-injection': 'public/cmd_injection_diagram.jpg',
        'xss-reflected': 'public/xss_diagram.jpg',
        'xss-stored': 'public/stored_xss_diagram.jpg',

        'csrf': 'public/csrf_diagram.jpg',
        'file-inclusion': 'public/file_inclusion_diagram.jpg',
        'file-upload': 'public/file_upload_diagram.jpg',
        'insecure-captcha': 'public/insecure_captcha_diagram.jpg',
        'weak-session': 'public/weak_session_diagram.jpg'

      const path = mapping[id];
      if (path) {
        return `
          <div class="rounded-lg overflow-hidden border border-cyber-border bg-cyber-bg-darker/60 h-48 sm:h-56 shadow-lg relative">

      let desc = 'Rapid inputs dictionary flooding';

        icon = 'layers'; title = 'UI_REDRESS'; desc = 'Transparent overlay overlays'; color = 'border-cyber-blue/35 bg-cyber-blue/5 text-cyber-blue';

        icon = 'globe'; title = 'PARAMETER_REDIRECT'; desc = 'Dynamic redirect link routing'; color = 'border-cyber-blue/35 bg-cyber-blue/5 text-cyber-blue';

    // Dynamic SVG Illustrations Model
    const renderSvgVectorDiagram = (id) => {

    // Interactive Sandbox Simulator Logic
    function renderSandbox(id) {

                  >
                    <i data-lucide="shield-alert" class="h-4 w-4"></i> VULNERABLE

                  <button
                    onclick="setSandboxMode('secure')"
                    class="flex-grow rounded border py-1.5 px-3 flex items-center justify-center gap-1.5 transition ${

                        : 'border-cyber-border bg-cyber-bg text-cyber-text-muted hover:border-cyber-green/50'
                    }"
                  >
                    <i data-lucide="shield-check" class="h-4 w-4"></i> SECURE
                  </button>

              </div>

              <div>
                <span class="text-[9px] text-cyber-text-muted block mb-1.5 uppercase">Payload Library</span>

                    <button
                      onclick="selectSandboxPayload('${p.value}')"

                      <span class="text-[8px] font-bold text-cyber-blue block uppercase">${p.label}</span>
                      <span class="text-[10px] text-cyber-text-bright truncate block mt-0.5">${p.value}</span>
                    </button>
                  `).join('')}
                </div>
              </div>

              <div>
                <span class="text-[9px] text-cyber-text-muted block mb-1.5 uppercase">Test Input</span>
                <input
                  type="text"
                  id="sandbox-input-box"
                  value="${sandboxInput}"
                  placeholder="Insert custom parameter query here..."
                  class="w-full rounded border border-cyber-border bg-cyber-bg px-3 py-2 text-cyber-text-bright outline-none focus:border-cyber-green"
                  oninput="updateSandboxInput(this.value)"
                />
              </div>

              <div class="flex gap-2">
                <button
                  onclick="runSandboxSimulation('${a.id}')"
                  id="sandbox-run-btn"
                  ${!sandboxInput || isSimulating ? 'disabled' : ''}
                  class="flex-grow rounded py-2 px-4 flex items-center justify-center gap-1.5 font-bold transition ${
                    (!sandboxInput || isSimulating)
                      ? 'border border-cyber-border/40 bg-cyber-bg/25 text-cyber-text-muted/40 cursor-not-allowed'
                      : 'bg-cyber-green text-cyber-bg hover:shadow-[0_0_12px_rgba(16,185,129,0.4)]'
                  }"
                >
                  ${isSimulating ? '<i data-lucide="refresh-cw" class="h-4 w-4 animate-spin"></i> PARSING_TRAFFIC...' : '<i data-lucide="play" class="h-4 w-4 fill-current"></i> RUN_SIMULATION'}

                <button onclick="resetSandbox()" class="rounded border border-cyber-border bg-cyber-card p-2 text-cyber-text-muted hover:border-cyber-green hover:text-cyber-green transition">

                <div class="space-y-1.5 overflow-y-auto pr-1">
                  ${sandboxLogs.length > 0 ? `
                    ${sandboxLogs.map(log => {
                      let logColor = 'text-cyber-text-muted';
                      if (log.startsWith('[REQUEST]')) logColor = 'text-cyber-blue';
                      if (log.startsWith('[WARNING]')) logColor = 'text-cyber-red font-bold animate-pulse';
                      if (log.startsWith('[SYSTEM]')) logColor = 'text-cyber-text-muted/50';
                      if (log.includes('Executing query safely') || log.includes('escaped') || log.includes('Neutralized')) logColor = 'text-cyber-green';
                      return `<div class="leading-relaxed text-[10px] ${logColor}">${log}</div>`;
                    }).join('')}
                  ` : `
                    <div class="text-center text-cyber-text-muted/40 py-10">
                      <i data-lucide="terminal" class="h-10 w-10 mx-auto opacity-30 mb-2"></i>
                      <span>Enter input parameters and click RUN_SIMULATION to parse execution steps.</span>

                ${sandboxResult && !isSimulating ? `

      sandboxInput = '';

    const getSuggestedPayloads = (id) => {
      if (id.includes('sql')) {
        return [
          { label: 'Normal Lookup', value: 'smith' },
          { label: 'Auth Bypass', value: "admin' OR '1'='1" },
          { label: 'Union Exfiltration', value: "1' UNION SELECT username, password FROM users --" }

      }
      if (id === 'command-injection') {
        return [
          { label: 'Safe Hostname', value: 'google.com' },
          { label: 'Chain Shell Command', value: '8.8.8.8; whoami' },
          { label: 'Exfiltrate System File', value: '127.0.0.1 && cat /etc/passwd' }
        ];
      }
      return [
